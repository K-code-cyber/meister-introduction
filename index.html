<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교 랜덤 자리배치 프로그램</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1> 학교 랜덤 자리배치 프로그램 </h1>
            <p>교탁 기준 격자형 랜덤 자리 배치 </p>
        </header>

        <section class="control-panel">
            <div class="input-group">
                <label for="total-students"> 총 인원수:</label>
                <input type="number" id="total-students" min="1" value="24"> 명
            </div>

            <div class="input-group">
                <label for="front-students">👓 앞자리 우선 배정 학생 번호:</label>
                <input type="text" id="front-students" placeholder="예: 3, 14, 21">
                <span class="help-text">* 쉼표(,)로 구분해서 입력</span>
            </div>

            <div class="input-group">
                <label> 배정 방식:</label>
                <div class="radio-group">
                    <label><input type="radio" name="seat-type" value="single" checked> 개인석 (5열 세로배치)</label>
                    <label><input type="radio" name="seat-type" value="pair"> 짝꿍석 (3분단 배치)</label>
                </div>
            </div>

            <button id="btn-arrange" onclick="arrangeSeats()"> 자리 배치하기</button>
        </section>

        <main class="classroom">
            <div class="blackboard">교 탁 (앞)</div>
            <div id="seat-layout" class="seat-layout"></div>
        </main>
    </div>

    <script>
        function arrangeSeats() {
            const totalStudents = parseInt(document.getElementById('total-students').value);
            const frontStudentsInput = document.getElementById('front-students').value;
            const seatType = document.querySelector('input[name="seat-type"]:checked').value;
            const layoutContainer = document.getElementById('seat-layout');

            if (isNaN(totalStudents) || totalStudents <= 0) {
                alert(' 올바른 인원수를 입력해주세요.');
                return;
            }

            let frontStudents = frontStudentsInput.split(',')
                .map(num => parseInt(num.trim()))
                .filter(num => !isNaN(num) && num > 0 && num <= totalStudents);

            frontStudents = [...new Set(frontStudents)];

            let regularStudents = [];
            for (let i = 1; i <= totalStudents; i++) {
                if (!frontStudents.includes(i)) {
                    regularStudents.push(i);
                }

            for (let i = regularStudents.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [regularStudents[i], regularStudents[j]] = [regularStudents[j], regularStudents[i]];
            }

            let finalSeating = [...frontStudents, ...regularStudents];

            layoutContainer.innerHTML = '';
            
            if (seatType === 'single') {
                layoutContainer.className = 'seat-layout grid-single';
                
                finalSeating.forEach(num => {
                    const seat = document.createElement('div');
                    seat.className = 'seat animate-pop';
                    if (frontStudents.includes(num)) {
                        seat.classList.add('highlight');
                    }
                    seat.innerText = num;
                    layoutContainer.appendChild(seat);
                });
            } else {
                layoutContainer.className = 'seat-layout grid-pair';
                
                for (let i = 0; i < finalSeating.length; i += 2) {
                    const desk = document.createElement('div');
                    desk.className = 'desk-pair animate-pop';

                    const seat1 = document.createElement('div');
                    seat1.className = 'seat';
                    seat1.innerText = finalSeating[i];
                    if (frontStudents.includes(finalSeating[i])) {
                        seat1.classList.add('highlight');
                    }
                
                    const seat2 = document.createElement('div');
                    seat2.className = 'seat';
                    if (finalSeating[i + 1]) {
                        seat2.innerText = finalSeating[i + 1];
                        if (frontStudents.includes(finalSeating[i + 1])) {
                            seat2.classList.add('highlight');
                        }
                    } else {
                        seat2.className = 'seat empty';
                        seat2.innerText = '-';
                    }
                    desk.appendChild(seat2);

                    layoutContainer.appendChild(desk);
                }
            }
        }

        window.onload = arrangeSeats;
    </script>
</body>
</html>
